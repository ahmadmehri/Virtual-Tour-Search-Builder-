<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="280" viewBox="0 0 1080 280" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="1080" height="280" rx="16" fill="#0c1016"/>

  <!-- arrows -->
  <g stroke="#2da3ff" stroke-width="3" fill="none" opacity="0.8">
    <line x1="350" y1="140" x2="392" y2="140" marker-end="url(#a)"/>
    <line x1="708" y1="140" x2="750" y2="140" marker-end="url(#a)"/>
  </g>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2da3ff"/>
    </marker>
  </defs>

  <!-- step 1 -->
  <g transform="translate(30,50)">
    <rect width="320" height="180" rx="14" fill="#141b26" stroke="#243042"/>
    <circle cx="40" cy="44" r="22" fill="#123a5c"/>
    <text x="40" y="52" fill="#7ec5ff" font-size="22" font-weight="800" text-anchor="middle">1</text>
    <text x="78" y="42" fill="#eef3f9" font-size="22" font-weight="700">Load tour</text>
    <text x="78" y="64" fill="#9fb2c6" font-size="14">Drop your 3DVista export folder</text>
    <!-- folder glyph -->
    <g transform="translate(120,92)">
      <path d="M0,8 q0,-8 8,-8 h22 l10,10 h38 q8,0 8,8 v40 q0,8 -8,8 h-70 q-8,0 -8,-8 Z" fill="#2da3ff" opacity="0.9"/>
    </g>
    <text x="160" y="166" fill="#64778c" font-size="12.5" text-anchor="middle">It reads scenes, hotspots &amp; the scene graph</text>
  </g>

  <!-- step 2 -->
  <g transform="translate(388,50)">
    <rect width="320" height="180" rx="14" fill="#141b26" stroke="#243042"/>
    <circle cx="40" cy="44" r="22" fill="#123a5c"/>
    <text x="40" y="52" fill="#7ec5ff" font-size="22" font-weight="800" text-anchor="middle">2</text>
    <text x="78" y="42" fill="#eef3f9" font-size="22" font-weight="700">Configure</text>
    <text x="78" y="64" fill="#9fb2c6" font-size="14">Pick types, rename, add keywords</text>
    <!-- toggles -->
    <g transform="translate(40,96)" font-size="13" font-weight="600">
      <rect width="118" height="30" rx="8" fill="#0f141c" stroke="#2b3b4f"/><rect x="9" y="9" width="12" height="12" rx="3" fill="#2da3ff"/><text x="30" y="20" fill="#cfe0f1">Scenes</text>
      <g transform="translate(130,0)"><rect width="138" height="30" rx="8" fill="#0f141c" stroke="#2b3b4f"/><rect x="9" y="9" width="12" height="12" rx="3" fill="#2da3ff"/><text x="30" y="20" fill="#cfe0f1">Hotspots</text></g>
    </g>
    <g transform="translate(40,136)" font-size="13">
      <rect width="258" height="28" rx="8" fill="#0f141c" stroke="#243042"/>
      <text x="12" y="19" fill="#7d8ea0">“01” → “Kitchen counter” + keywords…</text>
    </g>
  </g>

  <!-- step 3 -->
  <g transform="translate(746,50)">
    <rect width="320" height="180" rx="14" fill="#141b26" stroke="#243042"/>
    <circle cx="40" cy="44" r="22" fill="#1c4a2b"/>
    <text x="40" y="52" fill="#6fe39a" font-size="22" font-weight="800" text-anchor="middle">3</text>
    <text x="78" y="42" fill="#eef3f9" font-size="22" font-weight="700">Export</text>
    <text x="78" y="64" fill="#9fb2c6" font-size="14">One-click ready-to-publish .zip</text>
    <g transform="translate(60,100)">
      <rect width="200" height="44" rx="10" fill="#2da3ff"/>
      <text x="100" y="29" fill="#06121f" font-size="16" font-weight="800" text-anchor="middle">↓ Export tour (.zip)</text>
    </g>
    <text x="160" y="166" fill="#64778c" font-size="12.5" text-anchor="middle">Unzip → upload → done. No editing.</text>
  </g>
</svg>
