<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="340" viewBox="0 0 1080 340" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="1080" height="340" rx="16" fill="#0c1016"/>
  <text x="40" y="48" fill="#eef3f9" font-size="24" font-weight="800">“Guide me” — the viewer walks the visitor there, scene by scene</text>
  <text x="40" y="76" fill="#9fb2c6" font-size="15">Builds a graph from the tour’s own scene connections, finds the shortest route, then turns toward each doorway and steps through.</text>

  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#b483ff"/>
    </marker>
  </defs>

  <!-- path of panoramas -->
  <g transform="translate(60,150)">
    <!-- connecting curved arrows -->
    <g fill="none" stroke="#b483ff" stroke-width="3" opacity="0.85">
      <path d="M150,60 C210,20 250,20 300,55" marker-end="url(#ar)"/>
      <path d="M450,60 C510,100 550,100 600,65" marker-end="url(#ar)"/>
      <path d="M750,60 C810,20 850,20 900,55" marker-end="url(#ar)"/>
    </g>

    <!-- node helper -->
    <!-- Pool -->
    <g transform="translate(40,40)">
      <circle r="40" fill="#16202c" stroke="#2da3ff" stroke-width="3"/>
      <text y="6" fill="#cfe0f1" font-size="14" font-weight="700" text-anchor="middle">Pool</text>
      <text y="62" fill="#7d8ea0" font-size="11" text-anchor="middle">start</text>
    </g>
    <!-- Master Bedroom -->
    <g transform="translate(340,40)">
      <circle r="40" fill="#16202c" stroke="#3a4a5e" stroke-width="3"/>
      <text y="2" fill="#cfe0f1" font-size="12.5" font-weight="700" text-anchor="middle">Master</text>
      <text y="18" fill="#cfe0f1" font-size="12.5" font-weight="700" text-anchor="middle">Bedroom</text>
    </g>
    <!-- Great Room -->
    <g transform="translate(640,40)">
      <circle r="40" fill="#16202c" stroke="#3a4a5e" stroke-width="3"/>
      <text y="-2" fill="#cfe0f1" font-size="12.5" font-weight="700" text-anchor="middle">Great</text>
      <text y="14" fill="#cfe0f1" font-size="12.5" font-weight="700" text-anchor="middle">Room</text>
    </g>
    <!-- Kitchen (target) -->
    <g transform="translate(940,40)">
      <circle r="44" fill="#123a5c" stroke="#2da3ff" stroke-width="4"/>
      <text y="-2" fill="#eef3f9" font-size="13.5" font-weight="800" text-anchor="middle">Kitchen</text>
      <text y="16" fill="#7ec5ff" font-size="11" text-anchor="middle">target</text>
      <text y="66" fill="#7d8ea0" font-size="11" text-anchor="middle">arrived ✓</text>
    </g>

    <!-- rotation hint -->
    <g transform="translate(225,-2)" fill="none" stroke="#e8943a" stroke-width="2.4">
      <path d="M0,0 a14,14 0 1 1 -10,5" marker-end="url(#aro)"/>
    </g>
    <defs><marker id="aro" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto"><path d="M0,0 L6,4 L0,8 Z" fill="#e8943a"/></marker></defs>
    <text x="205" y="-18" fill="#e8943a" font-size="11.5" font-weight="600" text-anchor="middle">turn shortest way</text>
  </g>

  <text x="540" y="318" fill="#64778c" font-size="13" text-anchor="middle">Auto-rotation is driven the shortest direction (left or right) toward each connecting hotspot, centres it, then “clicks” to enter the next panorama.</text>
</svg>
