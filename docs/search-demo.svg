<svg xmlns="http://www.w3.org/2000/svg" width="720" height="470" viewBox="0 0 720 470" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- faux panorama backdrop -->
  <rect width="720" height="470" rx="14" fill="#0c1016"/>
  <linearGradient id="pano" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#26384a"/>
    <stop offset="0.5" stop-color="#1a2532"/>
    <stop offset="1" stop-color="#101822"/>
  </linearGradient>
  <rect x="10" y="10" width="700" height="450" rx="12" fill="url(#pano)"/>
  <text x="28" y="40" fill="#41566b" font-size="13" font-weight="600" letter-spacing="1">VIRTUAL TOUR · PANORAMA VIEW</text>

  <!-- search widget -->
  <g filter="url(#sh)">
    <!-- search bar -->
    <g transform="translate(150,60)">
      <rect width="420" height="50" rx="12" fill="#121821" stroke="#2da3ff" stroke-width="2"/>
      <g transform="translate(16,15)" stroke="#2da3ff" stroke-width="2.4" fill="none">
        <circle cx="9" cy="9" r="8"/>
        <line x1="15" y1="15" x2="21" y2="21" stroke-linecap="round"/>
      </g>
      <text x="50" y="32" fill="#e8edf3" font-size="19" font-weight="600">kitch<tspan fill="#2da3ff" font-weight="400">|</tspan></text>
      <text x="392" y="32" fill="#7d8ea0" font-size="20">×</text>
    </g>

    <!-- results dropdown -->
    <g transform="translate(150,118)">
      <rect width="420" height="300" rx="12" fill="#0f141c" stroke="#243042"/>

      <!-- row: Kitchen (scene) -->
      <g transform="translate(0,0)">
        <rect x="6" y="6" width="408" height="52" rx="9" fill="#16202c"/>
        <rect x="16" y="16" width="32" height="32" rx="6" fill="#27384a"/>
        <text x="60" y="30" fill="#eef3f9" font-size="16" font-weight="600">Kitchen</text>
        <text x="60" y="48" fill="#7d8ea0" font-size="12">Panorama scene</text>
        <g transform="translate(300,18)"><rect width="58" height="22" rx="11" fill="#123a5c"/><text x="29" y="16" fill="#7ec5ff" font-size="11" font-weight="700" text-anchor="middle">SCENE</text></g>
        <g transform="translate(366,15)"><rect width="42" height="28" rx="8" fill="#2da3ff"/><text x="21" y="19" fill="#06121f" font-size="11" font-weight="800" text-anchor="middle">Guide</text></g>
      </g>

      <!-- row: Go to Kitchen (hotspot) -->
      <g transform="translate(0,58)">
        <rect x="16" y="16" width="32" height="32" rx="6" fill="#27384a"/>
        <text x="60" y="30" fill="#dfe7ef" font-size="16" font-weight="600">Go to Kitchen</text>
        <text x="60" y="48" fill="#7d8ea0" font-size="12">in Great Room</text>
        <g transform="translate(286,18)"><rect width="72" height="22" rx="11" fill="#4a2f12"/><text x="36" y="16" fill="#f0a85a" font-size="11" font-weight="700" text-anchor="middle">HOTSPOT</text></g>
      </g>

      <!-- row: Kohler Prolific (hotspot) -->
      <g transform="translate(0,116)">
        <rect x="16" y="16" width="32" height="32" rx="6" fill="#27384a"/>
        <text x="60" y="30" fill="#dfe7ef" font-size="16" font-weight="600">Kohler Prolific</text>
        <text x="60" y="48" fill="#7d8ea0" font-size="12">in Kitchen</text>
        <g transform="translate(286,18)"><rect width="72" height="22" rx="11" fill="#4a2f12"/><text x="36" y="16" fill="#f0a85a" font-size="11" font-weight="700" text-anchor="middle">HOTSPOT</text></g>
      </g>

      <!-- row: Progress Lighting (hotspot) -->
      <g transform="translate(0,174)">
        <rect x="16" y="16" width="32" height="32" rx="6" fill="#27384a"/>
        <text x="60" y="30" fill="#dfe7ef" font-size="16" font-weight="600">Progress Lighting</text>
        <text x="60" y="48" fill="#7d8ea0" font-size="12">in Kitchen</text>
        <g transform="translate(286,18)"><rect width="72" height="22" rx="11" fill="#4a2f12"/><text x="36" y="16" fill="#f0a85a" font-size="11" font-weight="700" text-anchor="middle">HOTSPOT</text></g>
      </g>

      <!-- row: Sierra Pacific (hotspot) -->
      <g transform="translate(0,232)">
        <rect x="16" y="16" width="32" height="32" rx="6" fill="#27384a"/>
        <text x="60" y="30" fill="#dfe7ef" font-size="16" font-weight="600">Sierra Pacific</text>
        <text x="60" y="48" fill="#7d8ea0" font-size="12">in Kitchen</text>
        <g transform="translate(286,18)"><rect width="72" height="22" rx="11" fill="#4a2f12"/><text x="36" y="16" fill="#f0a85a" font-size="11" font-weight="700" text-anchor="middle">HOTSPOT</text></g>
      </g>
    </g>
  </g>

  <text x="360" y="448" fill="#5b6e82" font-size="12.5" text-anchor="middle">Typed “kitch” → matches the Kitchen scene and every hotspot inside it (case-, accent- and typo-tolerant)</text>
</svg>
