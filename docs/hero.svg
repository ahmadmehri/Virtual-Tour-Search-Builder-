<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1016"/>
      <stop offset="1" stop-color="#141b26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2da3ff"/>
      <stop offset="1" stop-color="#7ec5ff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="319" rx="18" fill="none" stroke="#222c3a" stroke-width="1"/>

  <!-- magnifier mark -->
  <g transform="translate(70,96)" filter="url(#soft)">
    <circle cx="58" cy="58" r="54" fill="#10161f" stroke="url(#accent)" stroke-width="6"/>
    <circle cx="58" cy="58" r="30" fill="none" stroke="#2da3ff" stroke-width="7"/>
    <rect x="82" y="82" width="46" height="14" rx="7" transform="rotate(45 82 82)" fill="#2da3ff"/>
  </g>

  <text x="220" y="120" fill="#eef3f9" font-size="56" font-weight="800">VT Search Builder</text>
  <text x="222" y="166" fill="#9fb2c6" font-size="24" font-weight="500">Add a real search box to any 3DVista virtual tour — in three clicks.</text>

  <!-- chips -->
  <g font-size="17" font-weight="600">
    <g transform="translate(222,202)">
      <rect width="168" height="34" rx="17" fill="#15202e" stroke="#2b3b4f"/>
      <circle cx="20" cy="17" r="5" fill="#2da3ff"/>
      <text x="34" y="23" fill="#cfe0f1">100% offline</text>
    </g>
    <g transform="translate(402,202)">
      <rect width="196" height="34" rx="17" fill="#15202e" stroke="#2b3b4f"/>
      <circle cx="20" cy="17" r="5" fill="#36d17a"/>
      <text x="34" y="23" fill="#cfe0f1">No code, no upload</text>
    </g>
    <g transform="translate(610,202)">
      <rect width="214" height="34" rx="17" fill="#15202e" stroke="#2b3b4f"/>
      <circle cx="20" cy="17" r="5" fill="#e8943a"/>
      <text x="34" y="23" fill="#cfe0f1">Typo-tolerant search</text>
    </g>
    <g transform="translate(836,202)">
      <rect width="206" height="34" rx="17" fill="#15202e" stroke="#2b3b4f"/>
      <circle cx="20" cy="17" r="5" fill="#b483ff"/>
      <text x="34" y="23" fill="#cfe0f1">Guided navigation</text>
    </g>
  </g>

  <text x="222" y="276" fill="#64778c" font-size="15">Single self-contained HTML tool · works in any modern browser</text>
</svg>
